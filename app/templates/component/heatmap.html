<template id="heatmap">
  <div class="heatmap_container">
    <span class="rect" v-for="(box,index) in datalist" :data-tooltip="getTooltip(box,index)"
      :style="{ 'background-color': setColor(box)}">
      [[ box ]]
    </span>
  </div>

</template>

<script>

  Vue.component('heatmap', {
    template: "#heatmap",
    props: {
      points: { type: Number, default: 12 },
      datalist: { type: Array, default: () => [] },
      max: {
        type: Number,
        default: 30
      }
    },
    delimiters: ["[[", "]]"],
    data: function () {
      return {
        colorval: [],
        months: [
          'January',
          'February',
          'March',
          'April',
          'May',
          'June',
          'July',
          'August',
          'September',
          'October',
          'November',
          'December'
        ]
      }
    },
    mounted() {

      let raw = this;
      this.datalist.forEach(function (item) {
        raw.colorval.push((Number(item) / 30));
      })
    },
    methods: {
      setColor(val) {
        return 'rgb(250,' + Number(240-((Number(val) / 30) * 255) ) + ',250)'
      },
      getTooltip(days , index){
        return days+' days , '+this.months[index]
      }
    }
  })
</script>

  }

  [data-tooltip]:before,

  }

  /* Position tooltip above the element */
  [data-tooltip]:before {

    bottom: 150%;

    margin-bottom: 8px;
    margin-left: -80px;
    padding: 8px 12px;
    width: 160px;
    border-radius: 8px;
    background-color: #1e293b;
    color: #fff;
    content: attr(data-tooltip);
    text-align: center;
    font-size: 12px;
    font-weight: 500;
    line-height: 1.2;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
  }

  /* Triangle hack */
  [data-tooltip]:after {
    position: absolute;

  /* Show tooltip content on hover */
  [data-tooltip]:hover:before,

  }
</style>
